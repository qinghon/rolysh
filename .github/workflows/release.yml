name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    container: rustlang/rust:nightly-bullseye
    needs: create-release
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system packages
        shell: bash
        run: |
          apt-get update
          if [[ "${{ matrix.target }}" == *"musl"* ]]; then
            apt-get install -y musl-tools
            if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
              apt-get install -y gcc-aarch64-linux-gnu || true
              apt-get install -y musl-tools-arm64 musl-dev-arm64 || true
            elif [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
              apt-get install -y musl-dev musl-tools || true
            fi
          elif [[ "${{ matrix.target }}" == *"aarch64"* && "${{ matrix.target }}" == *"gnu"* ]]; then
            apt-get install -y \
              gcc-aarch64-linux-gnu \
              g++-aarch64-linux-gnu \
              binutils-aarch64-linux-gnu \
              libc6-dev-arm64-cross
          fi

      - name: Setup Rust target
        run: |
          # Add target (Rust is already installed in rustlang/rust:nightly-bullseye image)
          rustup target add ${{ matrix.target }}
          # Show versions
          rustc --version
          cargo --version

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        shell: bash
        run: |
          echo "Building for target: ${{ matrix.target }}"

          # Set environment variables for cross-compilation
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            echo "Setting up aarch64 GNU cross-compilation"
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc

          elif [[ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ]]; then
            echo "Setting up x86_64 GNU native compilation"
            export CC=gcc
            export CXX=g++
          elif [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            echo "Using aarch64-linux-gnu-gcc as linker for musl target"
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc
            export CC=aarch64-linux-gnu-gcc

          elif [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            echo "Setting up x86_64 musl compilation"
            # For x86_64 musl, try to use musl-gcc if available
            if which musl-gcc >/dev/null 2>&1; then
              echo "Found musl-gcc, using it as linker"
              export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
              export CC_x86_64_unknown_linux_musl=musl-gcc
              export RUSTFLAGS="-C linker=musl-gcc"
            fi
          fi

          # Try building with verbose output
          if ! cargo build --release --target ${{ matrix.target }} --verbose; then
            exit 1
          fi
          echo "Build completed"

      - name: Strip binary
        shell: bash
        run: |
          BINARY_PATH="target/${{ matrix.target }}/release/rolysh"
          if [ -f "$BINARY_PATH" ] && command -v strip &> /dev/null; then
            echo "Stripping binary..."
            strip "$BINARY_PATH"
          fi

      - name: Verify binary
        shell: bash
        run: |
          BINARY_PATH="target/${{ matrix.target }}/release/rolysh"
          if [ -f "$BINARY_PATH" ]; then
            echo "Binary information:"
            file "$BINARY_PATH" || true
            echo ""
            if [[ "${{ matrix.target }}" == *"musl"* ]]; then
              echo "Checking if static (musl):"
              # musl binaries should not depend on glibc
              ldd "$BINARY_PATH" 2>/dev/null || true
            else
              echo "Dynamic binary dependencies:"
              ldd "$BINARY_PATH" 2>/dev/null || true
            fi
          fi

      - name: Prepare artifact
        run: |
          mkdir -p release
          BINARY_NAME="rolysh-${{ matrix.target }}"
          # Copy binary
          cp target/${{ matrix.target }}/release/rolysh release/$BINARY_NAME
          # Create tar.gz archive
          cd release
          tar czf $BINARY_NAME.tar.gz $BINARY_NAME
          # Create checksum for both binary and archive
          sha256sum $BINARY_NAME > $BINARY_NAME.sha256
          sha256sum $BINARY_NAME.tar.gz > $BINARY_NAME.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rolysh-${{ matrix.target }}
          path: release/
          retention-days: 1

  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: macos-latest
    needs: create-release
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check installed targets
        run: |
          rustup target list --installed
          echo "Current toolchain:"
          rustc --version
          cargo --version

      - name: Build
        shell: bash
        run: |
          echo "Building for target: ${{ matrix.target }}"
          cargo build --release --target ${{ matrix.target }} --verbose || (
            echo "Build failed, trying to install target..."
            rustup target add ${{ matrix.target }}
            cargo build --release --target ${{ matrix.target }} --verbose
          )
          # Strip debug symbols
          strip target/${{ matrix.target }}/release/rolysh || true

      - name: Verify binary
        run: |
          BINARY_PATH="target/${{ matrix.target }}/release/rolysh"
          if [ -f "$BINARY_PATH" ]; then
            echo "Binary information:"
            file "$BINARY_PATH" || true
          fi

      - name: Prepare artifact
        run: |
          mkdir -p release
          BINARY_NAME="rolysh-${{ matrix.target }}"
          cp target/${{ matrix.target }}/release/rolysh release/$BINARY_NAME
          # Create tar.gz archive
          cd release
          tar czf $BINARY_NAME.tar.gz $BINARY_NAME
          # Create checksum for both binary and archive
          shasum -a 256 $BINARY_NAME > $BINARY_NAME.sha256
          shasum -a 256 $BINARY_NAME.tar.gz > $BINARY_NAME.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rolysh-${{ matrix.target }}
          path: release/
          retention-days: 1

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [create-release, build-linux, build-macos]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release_assets
          # Collect all binaries and checksums
          find artifacts -type f -name "rolysh-*" ! -name "*.sha256" -exec cp {} release_assets/ \;
          find artifacts -type f -name "*.sha256" -exec cp {} release_assets/ \;

          # Create README
          cat > release_assets/README.md << 'EOF'
          # Rolysh Binary Releases

          This release contains pre-built binaries for various platforms.

          ## Available Downloads

          Each platform has two download options:
          - **`rolysh-<target>`**: Raw binary
          - **`rolysh-<target>.tar.gz`**: Compressed archive containing the binary

          ### Platform-specific builds:

          - **Linux x86_64 static (musl)**: `rolysh-x86_64-unknown-linux-musl`
          - **Linux ARM64 static (musl)**: `rolysh-aarch64-unknown-linux-musl`
          - **Linux x86_64 dynamic (Debian 11)**: `rolysh-x86_64-unknown-linux-gnu`
          - **Linux ARM64 dynamic (Debian 11)**: `rolysh-aarch64-unknown-linux-gnu`
          - **macOS Intel**: `rolysh-x86_64-apple-darwin`
          - **macOS Apple Silicon**: `rolysh-aarch64-apple-darwin`

          ## Verification

          Each file has a corresponding `.sha256` file containing its SHA256 checksum.

          To verify a binary:
          ```bash
          sha256sum -c rolysh-<target>.sha256
          ```
          On macOS:
          ```bash
          shasum -a 256 -c rolysh-<target>.sha256
          ```

          ## Installation from archive

          ```bash
          # Extract the archive
          tar xzf rolysh-<target>.tar.gz

          # Make binary executable
          chmod +x rolysh-<target>

          # Move to a directory in your PATH
          sudo mv rolysh-<target> /usr/local/bin/rolysh
          ```

          ## License

          MIT License - see the source repository for details.
          EOF

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}