name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          if [[ "${{ matrix.target }}" == *"musl"* ]]; then
            echo "Installing musl tools for ${{ matrix.target }}"
            sudo apt-get install -y musl-tools
          elif [[ "${{ matrix.target }}" == *"aarch64"* && "${{ matrix.target }}" == *"gnu"* ]]; then
            echo "Installing cross-compilation tools for aarch64"
            sudo apt-get install -y gcc-aarch64-linux-gnu
          elif [[ "${{ matrix.target }}" == *"x86_64"* && "${{ matrix.target }}" == *"gnu"* ]]; then
            echo "Installing cross-compilation tools for x86_64"
            sudo apt-get install -y gcc-x86-64-linux-gnu
          fi

      - name: Install cross
        run: |
          cargo install cross

      - name: Show cross info
        run: |
          cross --version
          cross --help | head -20

      - name: Configure cross
        run: |
          # Create Cross.toml with appropriate configuration for each target
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            echo '[target.x86_64-unknown-linux-gnu]' > Cross.toml
            echo 'image = "debian:11"' >> Cross.toml
            echo 'toolchain = "nightly"' >> Cross.toml
          elif [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            echo '[target.aarch64-unknown-linux-gnu]' > Cross.toml
            echo 'image = "debian:11"' >> Cross.toml
            echo 'toolchain = "nightly"' >> Cross.toml
          else
            # For musl targets, use default image with nightly toolchain
            echo "[target.${{ matrix.target }}]" > Cross.toml
            echo 'toolchain = "nightly"' >> Cross.toml
          fi

      - name: Build with cross
        run: |
          echo "Building for target: ${{ matrix.target }}"
          echo "Cross.toml content:"
          cat Cross.toml || true
          cross build --release --target ${{ matrix.target }} --verbose

      - name: Strip binary
        run: |
          BINARY_PATH="target/${{ matrix.target }}/release/rolysh"
          if [ -f "$BINARY_PATH" ] && command -v strip &> /dev/null; then
            strip "$BINARY_PATH"
          fi

      - name: Verify binary
        run: |
          BINARY_PATH="target/${{ matrix.target }}/release/rolysh"
          if [ -f "$BINARY_PATH" ]; then
            echo "Binary information:"
            file "$BINARY_PATH" || true
            echo ""
            if [[ "${{ matrix.target }}" == *"musl"* ]]; then
              echo "Checking if static (musl):"
              # musl binaries should not depend on glibc
              ldd "$BINARY_PATH" 2>/dev/null || true
            else
              echo "Dynamic binary dependencies:"
              ldd "$BINARY_PATH" 2>/dev/null || true
            fi
          fi

      - name: Prepare artifact
        run: |
          mkdir -p release
          BINARY_NAME="rolysh-${{ matrix.target }}"
          # Copy binary
          cp target/${{ matrix.target }}/release/rolysh release/$BINARY_NAME
          # Create tar.gz archive
          cd release
          tar czf $BINARY_NAME.tar.gz $BINARY_NAME
          # Create checksum for both binary and archive
          sha256sum $BINARY_NAME > $BINARY_NAME.sha256
          sha256sum $BINARY_NAME.tar.gz > $BINARY_NAME.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rolysh-${{ matrix.target }}
          path: release/
          retention-days: 1

  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: macos-latest
    needs: create-release
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check installed targets
        run: |
          rustup target list --installed
          echo "Current toolchain:"
          rustc --version
          cargo --version

      - name: Build
        run: |
          echo "Building for target: ${{ matrix.target }}"
          cargo build --release --target ${{ matrix.target }} --verbose || (
            echo "Build failed, trying to install target..."
            rustup target add ${{ matrix.target }}
            cargo build --release --target ${{ matrix.target }} --verbose
          )
          # Strip debug symbols
          strip target/${{ matrix.target }}/release/rolysh || true

      - name: Verify binary
        run: |
          BINARY_PATH="target/${{ matrix.target }}/release/rolysh"
          if [ -f "$BINARY_PATH" ]; then
            echo "Binary information:"
            file "$BINARY_PATH" || true
          fi

      - name: Prepare artifact
        run: |
          mkdir -p release
          BINARY_NAME="rolysh-${{ matrix.target }}"
          cp target/${{ matrix.target }}/release/rolysh release/$BINARY_NAME
          # Create tar.gz archive
          cd release
          tar czf $BINARY_NAME.tar.gz $BINARY_NAME
          # Create checksum for both binary and archive
          shasum -a 256 $BINARY_NAME > $BINARY_NAME.sha256
          shasum -a 256 $BINARY_NAME.tar.gz > $BINARY_NAME.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rolysh-${{ matrix.target }}
          path: release/
          retention-days: 1

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [create-release, build-linux, build-macos]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release_assets
          # Collect all binaries and checksums
          find artifacts -type f -name "rolysh-*" ! -name "*.sha256" -exec cp {} release_assets/ \;
          find artifacts -type f -name "*.sha256" -exec cp {} release_assets/ \;

          # Create README
          cat > release_assets/README.md << 'EOF'
          # Rolysh Binary Releases

          This release contains pre-built binaries for various platforms.

          ## Available Downloads

          Each platform has two download options:
          - **`rolysh-<target>`**: Raw binary
          - **`rolysh-<target>.tar.gz`**: Compressed archive containing the binary

          ### Platform-specific builds:

          - **Linux x86_64 static (musl)**: `rolysh-x86_64-unknown-linux-musl`
          - **Linux ARM64 static (musl)**: `rolysh-aarch64-unknown-linux-musl`
          - **Linux x86_64 dynamic (Debian 11)**: `rolysh-x86_64-unknown-linux-gnu`
          - **Linux ARM64 dynamic (Debian 11)**: `rolysh-aarch64-unknown-linux-gnu`
          - **macOS Intel**: `rolysh-x86_64-apple-darwin`
          - **macOS Apple Silicon**: `rolysh-aarch64-apple-darwin`

          ## Verification

          Each file has a corresponding `.sha256` file containing its SHA256 checksum.

          To verify a binary:
          ```bash
          sha256sum -c rolysh-<target>.sha256
          ```
          On macOS:
          ```bash
          shasum -a 256 -c rolysh-<target>.sha256
          ```

          ## Installation from archive

          ```bash
          # Extract the archive
          tar xzf rolysh-<target>.tar.gz

          # Make binary executable
          chmod +x rolysh-<target>

          # Move to a directory in your PATH
          sudo mv rolysh-<target> /usr/local/bin/rolysh
          ```

          ## License

          MIT License - see the source repository for details.
          EOF

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}